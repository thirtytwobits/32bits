# PR build check — fails fast if a change breaks the build, type check,
# or formatter, without deploying anything.

name: Preview build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (PR)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Upload built artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
