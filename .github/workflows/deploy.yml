# Build and deploy 32bits.io to GitHub Pages on every push to main.
# See ROADMAP.md §4 Phase 6.
#
# This workflow uses GitHub's first-party Pages deploy action. To activate:
#   Settings → Pages → Source: "GitHub Actions"
# (a one-time, repo-level setting that can't be done from this file).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deployment requires these permissions on the GITHUB_TOKEN.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time. New pushes cancel an older queued run
# but never interrupt a deploy that's already in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Git LFS hosts the large media. Without this, image src paths
          # resolve to LFS pointer files instead of the actual binaries.
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
